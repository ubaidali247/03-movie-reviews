<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Reviews</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Movie Reviews</div>
    <div class="nav-links">
        <a href="#dashboard" class="nav-link" data-page="dashboard">Home</a>
        <a href="#movies" class="nav-link" data-page="movies">Movies</a>
        <a href="#add" class="nav-link" data-page="add">Watchlist</a>
    </div>
  </nav>

  <main class="container">
    <!-- Dashboard Page -->
    <div id="page-dashboard" class="page">
      <h1 class="page-title">Dashboard</h1>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="stat-total">0</div>
          <div class="stat-label">Total Movies</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-recent">0</div>
          <div class="stat-label">Added This Week</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="stat-categories">5</div>
          <div class="stat-label">Categories</div>
        </div>
      </div>
      <div class="recent-section">
        <h2>Recent Movies</h2>
        <div id="recent-list" class="items-grid"></div>
      </div>
    </div>

    <!-- List Page -->
    <div id="page-movies" class="page hidden">
      <div class="page-header">
        <h1 class="page-title">Movies</h1>
        <button class="btn btn-primary" id="btn-add-new">+ Add New</button>
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search movies..." class="search-input">
        <select id="filter-category" class="filter-select">
          <option value="">All Categories</option>
          <option value="Action">Action</option>
          <option value="Comedy">Comedy</option>
          <option value="Drama">Drama</option>
          <option value="Sci-Fi">Sci-Fi</option>
          <option value="Horror">Horror</option>
        </select>
      </div>
      <div id="movies-list" class="items-grid"></div>
    </div>

    <!-- Add/Edit Page -->
    <div id="page-add" class="page hidden">
      <h1 class="page-title" id="form-title">Add New Movie</h1>
      <form id="item-form" class="form-card">
        <input type="hidden" id="item-id">
        <div class="form-group"><label for="field-title">Movie Title</label><input type="text" id="field-title" name="title" data-field="title" placeholder="Movie Title"></div>
        <div class="form-group"><label for="field-genre">Genre</label><select id="field-genre" name="genre" data-field="genre"><option value="">Select...</option><option value="Action">Action</option><option value="Comedy">Comedy</option><option value="Drama">Drama</option><option value="Sci-Fi">Sci-Fi</option><option value="Horror">Horror</option></select></div>
        <div class="form-group"><label for="field-year">Year</label><input type="text" id="field-year" name="year" data-field="year" placeholder="Year"></div>
        <div class="form-group"><label for="field-rating">Rating (1-5)</label><input type="text" id="field-rating" name="rating" data-field="rating" placeholder="Rating (1-5)"></div>
        <div class="form-group"><label for="field-review">Review</label><textarea id="field-review" name="review" data-field="review"></textarea></div>
        <div class="form-group"><label for="field-watchStatus">Watch Status</label><select id="field-watchStatus" name="watchStatus" data-field="watchStatus"><option value="">Select...</option><option value="watched">watched</option><option value="watchlist">watchlist</option><option value="watching">watching</option></select></div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="btn-submit">Save</button>
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
        </div>
      </form>
    </div>

    <!-- Detail Page -->
    <div id="page-detail" class="page hidden">
      <div class="page-header">
        <button class="btn btn-secondary" id="btn-back">← Back</button>
        <div>
          <button class="btn btn-primary" id="btn-edit">Edit</button>
          <button class="btn btn-danger" id="btn-delete">Delete</button>
        </div>
      </div>
      <div id="detail-content" class="detail-card"></div>
    </div>
  </main>

  <div id="toast" class="toast hidden"></div>

  <script>
    const API = 'http://localhost:3003/api/movies';
    const ENTITY = 'movies';
    let currentId = null;

    function showPage(name) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
      document.getElementById('page-' + name).classList.remove('hidden');
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      const activeLink = document.querySelector('[data-page="' + name + '"]') ||
                         document.querySelector('[data-page="' + ENTITY + '"]');
      if (activeLink && (name === 'dashboard' || name === ENTITY || name === 'add')) {
        document.querySelector('[data-page="' + name + '"]')?.classList.add('active');
      }
    }

    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      setTimeout(() => t.classList.add('hidden'), 3000);
    }

    async function fetchItems(search='', category='') {
      let url = API;
      const params = new URLSearchParams();
      if (search) params.set('search', search);
      if (category) params.set('category', category);
      if (params.toString()) url += '?' + params.toString();
      const res = await fetch(url);
      return res.json();
    }

    function renderCard(item) {
      const title = item.title || item.name || 'Untitled';
      const subtitle = item.category || item.author || item.company || '';
      const badge = item.status || item.priority || item.rating || '';
      return `<div class="item-card" data-id="${item.id}">
        <h3 class="item-title">${title}</h3>
        ${subtitle ? `<p class="item-subtitle">${subtitle}</p>` : ''}
        ${badge ? `<span class="badge">${badge}</span>` : ''}
        <p class="item-desc">${item.description || item.content || item.review || item.notes || ''}</p>
        <div class="card-actions">
          <button class="btn-sm btn-view" onclick="viewItem('${item.id}')">View</button>
          <button class="btn-sm btn-edit-card" onclick="editItem('${item.id}')">Edit</button>
          <button class="btn-sm btn-delete-card" onclick="deleteItem('${item.id}')">Delete</button>
        </div>
      </div>`;
    }

    async function loadList() {
      const search = document.getElementById('search-input')?.value || '';
      const category = document.getElementById('filter-category')?.value || '';
      const items = await fetchItems(search, category);
      document.getElementById(ENTITY + '-list').innerHTML = items.length
        ? items.map(renderCard).join('')
        : '<p class="empty-state">No items found. Add your first one!</p>';
    }

    async function loadDashboard() {
      const items = await fetchItems();
      document.getElementById('stat-total').textContent = items.length;
      const weekAgo = new Date(Date.now() - 7*24*60*60*1000);
      const recent = items.filter(i => new Date(i.createdAt) > weekAgo);
      document.getElementById('stat-recent').textContent = recent.length;
      const recentList = document.getElementById('recent-list');
      recentList.innerHTML = items.slice(0, 4).map(renderCard).join('') || '<p class="empty-state">No items yet.</p>';
    }

    async function viewItem(id) {
      currentId = id;
      const res = await fetch(API + '/' + id);
      const item = await res.json();
      const content = Object.entries(item)
        .filter(([k]) => !['id','createdAt','updatedAt'].includes(k))
        .map(([k,v]) => `<div class="detail-row"><span class="detail-label">${k}</span><span class="detail-value">${Array.isArray(v) ? v.join(', ') : v}</span></div>`)
        .join('');
      document.getElementById('detail-content').innerHTML = `<h2>${item.title || item.name}</h2>${content}`;
      showPage('detail');
    }

    async function editItem(id) {
      currentId = id;
      const res = await fetch(API + '/' + id);
      const item = await res.json();
      document.getElementById('form-title').textContent = 'Edit Item';
      document.getElementById('item-id').value = id;
      Object.entries(item).forEach(([k,v]) => {
        const el = document.getElementById('field-' + k);
        if (el) el.value = Array.isArray(v) ? v.join(', ') : v;
      });
      showPage('add');
    }

    async function deleteItem(id) {
      if (!confirm('Are you sure you want to delete this item?')) return;
      await fetch(API + '/' + id, { method: 'DELETE' });
      showToast('Deleted successfully');
      loadList();
      showPage(ENTITY);
    }

    document.getElementById('item-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('item-id').value;
      const data = {};
      e.target.querySelectorAll('[data-field]').forEach(el => {
        data[el.dataset.field] = el.value;
      });
      const method = id ? 'PUT' : 'POST';
      const url = id ? API + '/' + id : API;
      const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      if (res.ok) {
        showToast(id ? 'Updated!' : 'Created!');
        currentId = null;
        document.getElementById('item-id').value = '';
        e.target.reset();
        showPage(ENTITY);
        loadList();
      }
    });

    document.getElementById('btn-cancel').addEventListener('click', () => showPage(ENTITY));
    document.getElementById('btn-back')?.addEventListener('click', () => { showPage(ENTITY); loadList(); });
    document.getElementById('btn-edit')?.addEventListener('click', () => currentId && editItem(currentId));
    document.getElementById('btn-delete')?.addEventListener('click', () => currentId && deleteItem(currentId));
    document.getElementById('btn-add-new')?.addEventListener('click', () => {
      document.getElementById('form-title').textContent = 'Add New Item';
      document.getElementById('item-id').value = '';
      document.getElementById('item-form').reset();
      currentId = null;
      showPage('add');
    });

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const page = link.dataset.page;
        showPage(page);
        if (page === 'dashboard') loadDashboard();
        if (page === ENTITY) loadList();
        if (page === 'add') {
          document.getElementById('form-title').textContent = 'Add New Item';
          document.getElementById('item-id').value = '';
          document.getElementById('item-form').reset();
          currentId = null;
        }
      });
    });

    document.getElementById('search-input')?.addEventListener('input', loadList);
    document.getElementById('filter-category')?.addEventListener('change', loadList);

    // Init
    showPage('dashboard');
    loadDashboard();
  </script>
</body>
</html>
